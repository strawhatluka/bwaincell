name: Deploy to Raspberry Pi

on:
  release:
    types: [published]
  workflow_dispatch:

# Prevent concurrent deployments
concurrency:
  group: deploy-pi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Deploy Frontend to Vercel (Production)
  # ---------------------------------------------------------------------------
  deploy-vercel:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    environment:
      name: production

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Validate Vercel secrets
        run: |
          missing=()
          [ -z "${{ secrets.VERCEL_TOKEN }}" ] && missing+=("VERCEL_TOKEN")
          [ -z "${{ secrets.VERCEL_ORG_ID }}" ] && missing+=("VERCEL_ORG_ID")
          [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ] && missing+=("VERCEL_PROJECT_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing secrets: ${missing[*]}. Cannot deploy to Vercel."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project configuration
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "### Frontend Deployed to Vercel" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $URL" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** ${{ github.event.release.tag_name || 'manual' }}" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Deploy Self-Hosted Supabase Stack to Raspberry Pi
  # ---------------------------------------------------------------------------
  deploy-supabase:
    name: Deploy Supabase to Raspberry Pi
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Backup Supabase database
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          key: ${{ secrets.PI_SSH_KEY }}
          passphrase: ${{ secrets.PI_SSH_PASSPHRASE }}
          port: ${{ secrets.PI_SSH_PORT || 22 }}
          timeout: 10m
          command_timeout: 10m
          script: |
            set -e

            echo "Capturing Supabase database backup..."
            cd ~/bwaincell || exit 0

            SUPABASE_CONTAINER=$(docker ps --format '{{.Names}}' | grep '^supabase_db_bwaincell$' | head -1)
            if [ -n "$SUPABASE_CONTAINER" ]; then
              BACKUP_DIR=~/bwaincell-backups/$(date +%Y-%m-%d-%H%M%S)
              mkdir -p "$BACKUP_DIR"
              echo "Creating Supabase database backup from $SUPABASE_CONTAINER..."
              docker exec "$SUPABASE_CONTAINER" pg_dump -U postgres postgres > "$BACKUP_DIR/supabase-pre-deploy.sql" || {
                echo "DB backup failed (non-critical — continuing)"
              }
              # Keep only last 10 backups
              ls -1dt ~/bwaincell-backups/*/ 2>/dev/null | tail -n +11 | xargs -r rm -rf
              echo "Supabase backup saved to $BACKUP_DIR"
            else
              echo "Supabase not running yet (first deployment) — skipping backup"
            fi

      - name: Sync repository on Pi
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          key: ${{ secrets.PI_SSH_KEY }}
          passphrase: ${{ secrets.PI_SSH_PASSPHRASE }}
          port: ${{ secrets.PI_SSH_PORT || 22 }}
          timeout: 10m
          command_timeout: 10m
          script: |
            set -e

            cd ~/bwaincell || {
              echo "Directory ~/bwaincell not found"
              exit 1
            }

            echo "Pulling latest code from GitHub..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd || echo "Some files could not be cleaned (non-critical)"

            if [ ! -f .env ]; then
              echo ".env not found!"
              exit 1
            fi

            echo "Repository updated: $(git log -1 --oneline)"

      - name: Start Supabase stack and apply migrations
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          key: ${{ secrets.PI_SSH_KEY }}
          passphrase: ${{ secrets.PI_SSH_PASSPHRASE }}
          port: ${{ secrets.PI_SSH_PORT || 22 }}
          timeout: 90m
          command_timeout: 90m
          script: |
            set -e

            echo "================================================"
            echo "Starting Self-Hosted Supabase Deployment"
            echo "================================================"

            cd ~/bwaincell

            if ! command -v supabase &> /dev/null && ! command -v npx &> /dev/null; then
              echo "Neither supabase CLI nor npx available on Pi"
              exit 1
            fi

            SUPABASE_CMD="supabase"
            if ! command -v supabase &> /dev/null; then
              SUPABASE_CMD="npx supabase"
            fi

            # Detect whether the stack is already up by container presence
            # (supabase status exit codes are unreliable across versions / link state)
            if docker ps --format '{{.Names}}' | grep -q '^supabase_db_bwaincell$'; then
              echo "Supabase stack already running"
            else
              echo "Starting Supabase stack (this may take a long time on first run)..."
              $SUPABASE_CMD start
            fi

            # Wait for Postgres to accept connections before migrating
            echo "Waiting for Supabase Postgres to be ready..."
            for i in $(seq 1 30); do
              if docker exec supabase_db_bwaincell pg_isready -U postgres -q 2>/dev/null; then
                echo "Supabase Postgres ready (attempt $i)"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "Supabase Postgres did not become ready in 60s"
                docker logs --tail=50 supabase_db_bwaincell || true
                exit 1
              fi
              sleep 2
            done

            echo "Applying Supabase migrations..."
            $SUPABASE_CMD migration up --local || {
              echo "Migration up failed — may already be applied or schema is current"
            }

            echo "================================================"
            echo "Supabase Deployment Complete"
            echo "================================================"

      - name: Verify Supabase health
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          key: ${{ secrets.PI_SSH_KEY }}
          passphrase: ${{ secrets.PI_SSH_PASSPHRASE }}
          port: ${{ secrets.PI_SSH_PORT || 22 }}
          timeout: 5m
          command_timeout: 3m
          script: |
            set -e
            cd ~/bwaincell

            echo "Verifying self-hosted Supabase health..."

            SUPABASE_CONTAINER=$(docker ps --format '{{.Names}}' | grep '^supabase_db_bwaincell$' | head -1)
            if [ -z "$SUPABASE_CONTAINER" ]; then
              echo "No Supabase database container running (expected supabase_db_bwaincell)"
              docker ps --format '{{.Names}}' | grep -i supabase || echo "(no supabase containers found)"
              exit 1
            fi

            if docker exec "$SUPABASE_CONTAINER" pg_isready -U postgres -q; then
              echo "Supabase PostgreSQL is ready"
            else
              echo "Supabase PostgreSQL not responding"
              exit 1
            fi

            # Check Supabase REST API (Kong gateway on 54321)
            if curl -sf http://127.0.0.1:54321/rest/v1/ > /dev/null 2>&1; then
              echo "Supabase REST API reachable"
            else
              echo "Supabase REST API check inconclusive (may require ANON_KEY)"
            fi

  # ---------------------------------------------------------------------------
  # Build Bot Image on Runner and Push to GHCR
  # ---------------------------------------------------------------------------
  # Builds the arm64 image on a fast ubuntu-latest runner via Buildx + QEMU
  # and pushes it to GitHub Container Registry. The Pi then pulls a prebuilt
  # image instead of building locally (saves ~15 minutes per deploy).
  build-bot-image:
    name: Build Bot Image (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image coordinates
        id: meta
        run: |
          # Lowercase the owner for GHCR compatibility (Docker registries require lowercase)
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LC}/bwaincell-backend"
          TAG="${{ github.sha }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image: ${IMAGE}"
          echo "Tag: ${TAG}"

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push arm64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Bot Image Built and Pushed" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ steps.meta.outputs.image }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** latest, ${{ steps.meta.outputs.tag }}" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Deploy Discord Bot to Raspberry Pi
  # ---------------------------------------------------------------------------
  # Pulls the prebuilt image from GHCR and starts it on the Pi.
  # No local builds on the Pi — saves ~15 minutes per deploy.
  deploy-bot:
    name: Deploy Bot to Raspberry Pi
    runs-on: ubuntu-latest
    needs: [deploy-supabase, build-bot-image]
    environment:
      name: production

    steps:
      - name: Backup current bot image for rollback
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          key: ${{ secrets.PI_SSH_KEY }}
          passphrase: ${{ secrets.PI_SSH_PASSPHRASE }}
          port: ${{ secrets.PI_SSH_PORT || 22 }}
          timeout: 5m
          command_timeout: 5m
          script: |
            set -e

            echo "Capturing current bot image for rollback..."
            cd ~/bwaincell || exit 0

            # Backup current :latest image (whatever is tagged locally) as :backup
            # for rollback. This still works with GHCR images because the local
            # tag is what matters for the rollback job.
            CURRENT_IMAGE=$(docker images -q $(cat .bot-image-ref 2>/dev/null)":latest" 2>/dev/null | head -1)
            if [ -n "$CURRENT_IMAGE" ]; then
              # Use the current image-ref file if present, otherwise fall back
              # to the legacy local tag for first deploys after this migration.
              REF=$(cat .bot-image-ref 2>/dev/null || echo "bwaincell-backend")
              docker tag "${REF}:latest" "${REF}:backup" 2>/dev/null || true
              echo "Backend image backed up: $CURRENT_IMAGE (${REF}:backup)"
            elif [ -n "$(docker images bwaincell-backend:latest -q 2>/dev/null)" ]; then
              # Legacy fallback for the first deploy after migrating to GHCR
              docker tag bwaincell-backend:latest bwaincell-backend:backup 2>/dev/null || true
              echo "Legacy backend image backed up (pre-GHCR migration)"
            else
              echo "No previous backend image to backup"
            fi

      - name: Pull image from GHCR and start bot
        uses: appleboy/ssh-action@v1.0.0
        env:
          IMAGE_REF: ${{ needs.build-bot-image.outputs.image }}
          IMAGE_TAG: ${{ needs.build-bot-image.outputs.tag }}
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          key: ${{ secrets.PI_SSH_KEY }}
          passphrase: ${{ secrets.PI_SSH_PASSPHRASE }}
          port: ${{ secrets.PI_SSH_PORT || 22 }}
          timeout: 20m
          command_timeout: 20m
          envs: IMAGE_REF,IMAGE_TAG
          script: |
            set -e

            echo "================================================"
            echo "Starting Bot Deployment (GHCR pull mode)"
            echo "================================================"
            echo "Image: ${IMAGE_REF}:${IMAGE_TAG}"

            cd ~/bwaincell || {
              echo "Directory ~/bwaincell not found"
              exit 1
            }

            # Pull latest code (for docker-compose.yml, supabase/ migrations, etc.)
            # Note: bot source code is NOT needed on the Pi anymore — it's baked
            # into the GHCR image. This git pull is only for compose config and
            # supabase migrations.
            git fetch origin main
            git reset --hard origin/main
            git clean -fd || echo "Some files could not be cleaned (non-critical)"

            if [ ! -f .env ]; then
              echo ".env not found!"
              exit 1
            fi

            # Record the image reference for future rollbacks
            echo "${IMAGE_REF}" > .bot-image-ref

            # Authenticate with GHCR (idempotent — docker stores credentials)
            # Token is stored as a repo secret; Pi uses it to pull private images.
            # If the repo is public, this login is not strictly required for pulls
            # but is harmless to include.
            if [ -n "${{ secrets.PI_GHCR_TOKEN }}" ]; then
              echo "${{ secrets.PI_GHCR_TOKEN }}" | docker login ghcr.io -u strawhatluka --password-stdin
            else
              echo "PI_GHCR_TOKEN not set — assuming public image or pre-existing login"
            fi

            echo "Pulling image ${IMAGE_REF}:${IMAGE_TAG}..."
            docker pull "${IMAGE_REF}:${IMAGE_TAG}"
            docker tag "${IMAGE_REF}:${IMAGE_TAG}" "${IMAGE_REF}:latest"
            echo "Image pulled successfully"

            echo "Stopping existing backend containers..."
            # NOTE: no --remove-orphans here; Supabase containers run in a
            # separate compose project and must not be touched.
            docker compose down || true
            docker rm -f bwaincell-backend 2>/dev/null || true

            # Clean up dangling images (but preserve :backup and the new :latest)
            docker image prune -f || true

            echo "Disk space after cleanup:"
            df -h / | grep -E "Filesystem|/dev/"

            echo "Starting backend service..."
            docker compose up -d

            echo "Waiting for backend (60s for Pi cold boot)..."
            sleep 60

            echo "Deploying Discord slash commands..."
            if docker compose exec -T backend node dist/src/deploy-commands.js 2>&1 | tee deploy-commands.log; then
              echo "Discord commands deployed"
            else
              echo "Command deployment failed — may already be registered (non-critical)"
            fi

            echo "Service status:"
            docker compose ps

            echo "Container resource usage:"
            timeout 10 docker stats bwaincell-backend --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}" || echo "Stats timed out"

            docker image prune -f || true

            echo "================================================"
            echo "Bot Deployment Complete"
            echo "================================================"
            echo "Backend:  $(docker inspect -f '{{.State.Health.Status}}' bwaincell-backend 2>/dev/null || echo 'running')"
            echo "================================================"

      - name: Verify bot health
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          key: ${{ secrets.PI_SSH_KEY }}
          passphrase: ${{ secrets.PI_SSH_PASSPHRASE }}
          port: ${{ secrets.PI_SSH_PORT || 22 }}
          timeout: 10m
          command_timeout: 10m
          script: |
            set -e

            echo "Post-Deployment Bot Health Verification"
            echo "========================================"
            cd ~/bwaincell

            # Bot health with retries (Pi startup can take 60s+)
            echo "Checking Bot health endpoint..."
            MAX_RETRIES=12
            RETRY_DELAY=10

            for i in $(seq 1 $MAX_RETRIES); do
              HEALTH_RESPONSE=$(curl -sf http://localhost:3000/health || echo "failed")

              if echo "$HEALTH_RESPONSE" | grep -q "healthy\|ok\|running"; then
                echo "Bot health check passed (attempt $i/$MAX_RETRIES)"
                echo "Response: $HEALTH_RESPONSE"
                break
              fi

              if [ $i -eq $MAX_RETRIES ]; then
                echo "Bot health check failed after $MAX_RETRIES attempts"
                echo "Last response: $HEALTH_RESPONSE"
                docker ps -a | grep bwaincell
                docker logs --tail=100 bwaincell-backend 2>&1 || echo "Could not retrieve logs"
                exit 1
              fi

              echo "Health check attempt $i/$MAX_RETRIES failed, retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            done

            # Backend container status
            BACKEND_STATUS=$(docker inspect -f '{{.State.Status}}' bwaincell-backend 2>/dev/null || echo "unknown")
            if [ "$BACKEND_STATUS" != "running" ]; then
              echo "Backend container not running: $BACKEND_STATUS"
              docker logs --tail=100 bwaincell-backend
              exit 1
            fi
            echo "Backend container is running"

            # Discord connection
            sleep 5
            if docker logs --tail=100 bwaincell-backend 2>&1 | grep -q "Ready!\|logged in\|Bot is ready\|Connected to Discord"; then
              echo "Bot connected to Discord"
            else
              echo "Discord connection not confirmed (may still be connecting)"
              docker logs --tail=50 bwaincell-backend
            fi

            echo "========================================"
            echo "All bot health checks passed"

  # ---------------------------------------------------------------------------
  # Automatic Rollback (on deployment failure)
  # ---------------------------------------------------------------------------
  rollback:
    name: Automatic Bot Rollback
    runs-on: ubuntu-latest
    needs: deploy-bot
    if: failure()

    steps:
      - name: Rollback backend and Supabase
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          key: ${{ secrets.PI_SSH_KEY }}
          passphrase: ${{ secrets.PI_SSH_PASSPHRASE }}
          port: ${{ secrets.PI_SSH_PORT || 22 }}
          timeout: 15m
          command_timeout: 10m
          script: |
            set -e

            echo "================================================"
            echo "Starting Automatic Rollback"
            echo "================================================"

            cd ~/bwaincell || {
              echo "Directory ~/bwaincell not found"
              exit 1
            }

            # Determine the current image ref (GHCR path, written by deploy-bot)
            # Falls back to legacy local tag for rollbacks immediately after the
            # GHCR migration where no ref file exists yet.
            REF=$(cat .bot-image-ref 2>/dev/null || echo "bwaincell-backend")
            echo "Image reference for rollback: ${REF}"

            # Check for backup image
            BACKUP_IMAGE=$(docker images "${REF}:backup" -q 2>/dev/null || echo "none")
            if [ "$BACKUP_IMAGE" = "none" ]; then
              echo "No backup image available — may be first deployment"
              exit 1
            fi

            echo "Backup image found: $BACKUP_IMAGE"

            # Restore backend
            echo "Stopping current container..."
            docker compose down || true

            echo "Restoring backup image..."
            docker tag "${REF}:backup" "${REF}:latest"

            echo "Starting service with backup image..."
            docker compose up -d

            echo "Waiting for services (60s)..."
            sleep 60

            # Health check
            for i in {1..15}; do
              HEALTH=$(curl -sf http://localhost:3000/health || echo "failed")
              if echo "$HEALTH" | grep -q "healthy\|ok\|running"; then
                echo "Bot health check passed after rollback"
                break
              fi
              echo "Attempt $i/15 — Bot not healthy yet, waiting..."
              sleep 3
            done

            # Note: Supabase DB restore is manual (too risky to automate)
            LATEST_BACKUP=$(ls -1dt ~/bwaincell-backups/*/ 2>/dev/null | head -1)
            if [ -n "$LATEST_BACKUP" ] && [ -f "${LATEST_BACKUP}supabase-pre-deploy.sql" ]; then
              SUPABASE_CONTAINER=$(docker ps --format '{{.Names}}' | grep '^supabase_db_bwaincell$' | head -1 || echo "")
              echo "Supabase backup available at: ${LATEST_BACKUP}supabase-pre-deploy.sql"
              if [ -n "$SUPABASE_CONTAINER" ]; then
                echo "Manual restore: docker exec -i $SUPABASE_CONTAINER psql -U postgres postgres < ${LATEST_BACKUP}supabase-pre-deploy.sql"
              fi
            fi

            echo "================================================"
            echo "Rollback Complete"
            echo "================================================"

      - name: Verify rollback
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          key: ${{ secrets.PI_SSH_KEY }}
          passphrase: ${{ secrets.PI_SSH_PASSPHRASE }}
          port: ${{ secrets.PI_SSH_PORT || 22 }}
          timeout: 5m
          command_timeout: 3m
          script: |
            set -e
            cd ~/bwaincell

            BACKEND_STATUS=$(docker inspect -f '{{.State.Status}}' bwaincell-backend 2>/dev/null || echo "unknown")
            if [ "$BACKEND_STATUS" != "running" ]; then
              echo "Backend rollback failed: $BACKEND_STATUS"
              exit 1
            fi

            HEALTH=$(curl -sf http://localhost:3000/health || echo "failed")
            if ! echo "$HEALTH" | grep -q "healthy\|ok\|running"; then
              echo "Backend health check failed after rollback"
              exit 1
            fi

            echo "Backend healthy after rollback"
