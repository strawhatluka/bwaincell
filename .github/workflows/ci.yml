# =============================================================================
# Bwaincell - CI/CD Pipeline (Monorepo)
# =============================================================================
# Workspace-aware testing with path-based change detection
# Runs parallel test jobs only for changed workspaces
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

# Prevent concurrent CI runs for the same PR
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect Changes - Which workspaces have changed?
  # ---------------------------------------------------------------------------
  changes:
    name: Detect Changed Workspaces
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      supabase: ${{ steps.filter.outputs.supabase }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
            supabase:
              - 'supabase/**'
            backend:
              - 'backend/**'
              - 'shared/**'
              - 'supabase/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'docker-compose.yml'
            frontend:
              - 'frontend/**'
              - 'shared/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'

  # ---------------------------------------------------------------------------
  # Test Shared Package
  # ---------------------------------------------------------------------------
  test-shared:
    name: Test Shared Package
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.shared == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build shared package
        run: npm run build --workspace=shared

      - name: Verify compiled output
        run: |
          test -f shared/dist/index.js || (echo "❌ Compiled index.js not found" && exit 1)
          test -f shared/dist/index.d.ts || (echo "❌ Type declarations not found" && exit 1)
          echo "✅ Shared package compiled successfully"

  # ---------------------------------------------------------------------------
  # Test Backend (Discord Bot + Express API)
  # ---------------------------------------------------------------------------
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    # Backend tests use mocked Supabase client — no live database needed.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build shared package
        run: npm run build --workspace=shared

      - name: Build supabase package (TS project reference for backend)
        run: npx tsc --build supabase

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Verify compiled output
        run: |
          test -f backend/dist/src/bot.js || (echo "❌ Compiled bot.js not found" && exit 1)
          echo "✅ Backend compiled successfully"

      - name: Lint backend
        run: npm run lint --workspace=backend

      - name: Run backend tests with coverage
        env:
          NODE_ENV: test
          SUPABASE_URL: http://test-supabase.local
          SUPABASE_SERVICE_ROLE_KEY: test-key
        run: npm run test:coverage --workspace=backend

      - name: Enforce backend coverage threshold (≥80%)
        run: |
          echo "📊 Verifying backend test coverage..."
          if [ -f "backend/coverage/coverage-summary.json" ]; then
            lines=$(node -e "const c = require('./backend/coverage/coverage-summary.json'); console.log(c.total.lines.pct);")
            branches=$(node -e "const c = require('./backend/coverage/coverage-summary.json'); console.log(c.total.branches.pct);")
            functions=$(node -e "const c = require('./backend/coverage/coverage-summary.json'); console.log(c.total.functions.pct);")
            statements=$(node -e "const c = require('./backend/coverage/coverage-summary.json'); console.log(c.total.statements.pct);")
            threshold=80

            echo "Coverage: lines=${lines}%, branches=${branches}%, functions=${functions}%, statements=${statements}%"
            echo "Required threshold: ${threshold}%"

            fail=0
            for metric_name in lines branches functions statements; do
              value=$(node -e "const c = require('./backend/coverage/coverage-summary.json'); console.log(c.total.${metric_name}.pct);")
              if (( $(echo "$value < $threshold" | bc -l) )); then
                echo "❌ ${metric_name} coverage ${value}% is below threshold ${threshold}%"
                fail=1
              fi
            done

            if [ $fail -eq 1 ]; then
              exit 1
            fi
            echo "✅ All backend coverage metrics meet the ${threshold}% threshold"
          else
            echo "❌ coverage-summary.json not found"
            exit 1
          fi

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  # ---------------------------------------------------------------------------
  # Test Frontend (Next.js 15 PWA)
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build shared package
        run: npm run build --workspace=shared

      - name: Build supabase package (TS project reference for frontend)
        run: npx tsc --build supabase

      - name: Lint frontend
        run: npm run lint --workspace=frontend

      - name: Build frontend
        env:
          NEXTAUTH_SECRET: test_secret_for_ci_build_only
          NEXTAUTH_URL: http://localhost:3010
          SUPABASE_URL: http://test-supabase.local
          SUPABASE_SERVICE_ROLE_KEY: test-key
        run: npm run build --workspace=frontend

      - name: Run frontend tests with coverage
        run: npm run test:coverage --workspace=frontend

      - name: Enforce frontend coverage threshold (≥80%)
        run: |
          echo "📊 Verifying frontend test coverage..."
          if [ -f "frontend/coverage/coverage-summary.json" ]; then
            threshold=80
            fail=0
            for metric_name in lines branches functions statements; do
              value=$(node -e "const c = require('./frontend/coverage/coverage-summary.json'); console.log(c.total.${metric_name}.pct);")
              echo "${metric_name}: ${value}%"
              if (( $(echo "$value < $threshold" | bc -l) )); then
                echo "❌ ${metric_name} coverage ${value}% is below threshold ${threshold}%"
                fail=1
              fi
            done

            if [ $fail -eq 1 ]; then
              exit 1
            fi
            echo "✅ All frontend coverage metrics meet the ${threshold}% threshold"
          else
            echo "❌ coverage-summary.json not found"
            exit 1
          fi

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ---------------------------------------------------------------------------
  # Validate Supabase Migrations
  # ---------------------------------------------------------------------------
  validate-supabase:
    name: Validate Supabase Migrations
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.supabase == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify migration files
        run: |
          echo "🔍 Checking Supabase migration files..."
          if [ ! -d "supabase/migrations" ]; then
            echo "❌ supabase/migrations directory not found"
            exit 1
          fi

          count=$(ls -1 supabase/migrations/*.sql 2>/dev/null | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "❌ No migration files found"
            exit 1
          fi
          echo "✅ Found $count migration file(s)"

      - name: Verify config.toml
        run: |
          if [ ! -f "supabase/config.toml" ]; then
            echo "❌ supabase/config.toml not found"
            exit 1
          fi
          echo "✅ supabase/config.toml present"

  # ---------------------------------------------------------------------------
  # Docker Build Test (Backend) - runs on all CI runs
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: bwaincell-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          docker images | grep bwaincell-backend
          echo "✅ Docker image built successfully"

  # ---------------------------------------------------------------------------
  # Summary Job - All tests must pass (BAS Quality Gate Report)
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI Worfklow
    runs-on: ubuntu-latest
    needs: [test-shared, test-backend, test-frontend, validate-supabase, docker-build]
    if: always()

    steps:
      - name: Quality Gate Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   Bwaincell - Quality Gate Report"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Workspace Results:"
          echo "  Shared:       ${{ needs.test-shared.result }}"
          echo "  Backend:      ${{ needs.test-backend.result }}"
          echo "  Frontend:     ${{ needs.test-frontend.result }}"
          echo "  Supabase:     ${{ needs.validate-supabase.result }}"
          echo "  Docker Build: ${{ needs.docker-build.result }}"
          echo ""
          echo "  Status (Monorepo):"
          echo "  Phase 1: Linting           ✅"
          echo "  Phase 2: Structure         ✅"
          echo "  Phase 3: Build             ${{ (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') && (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped') && '✅' || '❌' }}"
          echo "  Phase 4: Testing           ${{ (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') && (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped') && '✅' || '❌' }}"
          echo "  Phase 5: Coverage (≥80%)   ✅ (enforced on all four metrics)"
          echo "  Phase 6: Best Practices    ✅"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Fail if any job failed
          if [ "${{ needs.test-shared.result }}" == "failure" ] || \
             [ "${{ needs.test-backend.result }}" == "failure" ] || \
             [ "${{ needs.test-frontend.result }}" == "failure" ] || \
             [ "${{ needs.validate-supabase.result }}" == "failure" ] || \
             [ "${{ needs.docker-build.result }}" == "failure" ]; then
            echo "❌ One or more test jobs failed"
            exit 1
          fi

          echo "✅ All test jobs passed or skipped (no changes)"
