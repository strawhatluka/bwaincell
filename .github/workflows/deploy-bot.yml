name: Deploy to Raspberry Pi

on:
  release:
    types: [published]
  workflow_dispatch:

# Prevent concurrent deployments
concurrency:
  group: deploy-pi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Deploy to Raspberry Pi
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Raspberry Pi
    runs-on: ubuntu-latest
    environment:
      name: production

    outputs:
      previous-image: ${{ steps.backup-image.outputs.image }}
      deployment-successful: ${{ steps.deployment-result.outputs.success }}

    steps:
      - name: Backup current image tag
        id: backup-image
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          key: ${{ secrets.PI_SSH_KEY }}
          passphrase: ${{ secrets.PI_SSH_PASSPHRASE }}
          port: ${{ secrets.PI_SSH_PORT || 22 }}
          timeout: 5m
          command_timeout: 2m
          script: |
            set -e

            echo "🔍 Capturing current deployment state for rollback..."
            cd ~/bwaincell || exit 0

            # Get current backend image ID (if exists)
            CURRENT_IMAGE=$(docker images bwaincell-backend:latest -q 2>/dev/null || echo "none")

            if [ "$CURRENT_IMAGE" != "none" ]; then
              # Tag current image as backup
              docker tag bwaincell-backend:latest bwaincell-backend:backup 2>/dev/null || true
              echo "✅ Current image backed up as bwaincell-backend:backup"
              echo "Image ID: $CURRENT_IMAGE"
            else
              echo "ℹ️  No previous image to backup (first deployment)"
            fi

      - name: Deploy to Raspberry Pi
        id: deploy-main
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          key: ${{ secrets.PI_SSH_KEY }}
          passphrase: ${{ secrets.PI_SSH_PASSPHRASE }}
          port: ${{ secrets.PI_SSH_PORT || 22 }}
          timeout: 60m
          command_timeout: 45m
          script: |
            set -e  # Exit on any error

            echo "================================================"
            echo "Starting Raspberry Pi Deployment - Bwaincell"
            echo "================================================"

            # Navigate to project directory
            cd ~/bwaincell || {
              echo "❌ Directory ~/bwaincell not found"
              exit 1
            }

            # Pull latest code from GitHub
            echo "📥 Pulling latest code from GitHub..."
            git fetch origin main
            git reset --hard origin/main

            # Clean untracked files (skip permission errors)
            git clean -fd || echo "⚠️  Some files could not be cleaned (non-critical)"

            # Verify .env exists
            if [ ! -f .env ]; then
              echo "❌ .env not found!"
              exit 1
            fi

            echo "✅ Repository updated to latest commit"
            echo "Commit: $(git log -1 --oneline)"

            # Stop existing containers
            echo "🛑 Stopping existing containers..."
            docker compose down --remove-orphans || true

            # Force remove any lingering containers
            docker rm -f bwaincell-backend 2>/dev/null || true

            # Clean up old images and free disk space (preserve backup for rollback)
            echo "🧹 Cleaning up old images and freeing disk space..."

            # Only remove :latest tag, NOT the backup image
            # Check if backup exists and points to a different image than latest
            LATEST_ID=$(docker images bwaincell-backend:latest -q 2>/dev/null || echo "none")
            BACKUP_ID=$(docker images bwaincell-backend:backup -q 2>/dev/null || echo "none")

            if [ "$LATEST_ID" != "none" ] && [ "$LATEST_ID" != "$BACKUP_ID" ]; then
              docker rmi -f bwaincell-backend:latest || true
            elif [ "$LATEST_ID" != "none" ]; then
              # Latest and backup are the same image - just untag latest
              docker rmi bwaincell-backend:latest || true
            fi

            # Remove dangling images only (not all unused - preserves backup)
            docker image prune -f || true
            docker builder prune -af

            # Show disk space after cleanup
            echo "💾 Disk space after cleanup:"
            df -h / | grep -E "Filesystem|/dev/"

            # Build backend image
            echo "🔨 Building backend image..."
            docker build --no-cache \
              -t bwaincell-backend:latest \
              -f backend/Dockerfile \
              . 2>&1 | tee build-backend.log

            if [ ${PIPESTATUS[0]} -ne 0 ]; then
              echo "❌ Backend image build failed"
              tail -100 build-backend.log
              exit 1
            fi

            echo "✅ Backend image built successfully"

            # Start production service
            echo "🚀 Starting production service..."
            docker compose up -d

            # Wait for service to start (bot needs time: DB connect + command load + Discord login + API start)
            echo "⏳ Waiting for services to start (60s for Pi cold boot)..."
            sleep 60

            # Deploy Discord slash commands from container
            echo "🚀 Deploying Discord slash commands..."
            if docker compose exec -T backend node dist/src/deploy-commands.js 2>&1 | tee deploy-commands.log; then
              echo "✅ Discord commands deployed successfully"
            else
              echo "⚠️  Command deployment failed - commands may already be registered from previous deployment"
              echo "This is non-critical and deployment will continue"
            fi

            # Check service status
            echo "🔍 Checking service status..."
            docker compose ps

            # Verify bot health
            echo "🔍 Checking bot health..."
            for i in {1..15}; do
              HEALTH=$(curl -sf http://localhost:3000/health || echo "failed")
              if echo "$HEALTH" | grep -q "healthy\|ok\|running"; then
                echo "✅ Bot health check passed"
                echo "$HEALTH"
                break
              fi
              echo "Attempt $i/15 - Bot not healthy yet, waiting..."
              sleep 3
            done

            # Check bot logs for Discord connection
            echo "🔍 Checking bot Discord connection..."
            sleep 5
            docker compose logs --tail=50 backend | tee backend-logs.txt

            if grep -q "Ready!\|logged in\|Bot is ready\|Connected to Discord" backend-logs.txt; then
              echo "✅ Bot connected to Discord"
            else
              echo "⚠️  Bot connection not confirmed - check logs"
            fi

            # Display resource usage (with timeout to avoid hanging)
            echo "📊 Container resource usage:"
            timeout 10 docker stats bwaincell-backend --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}" || echo "⚠️  Stats collection timed out (non-critical)"

            # Clean up dangling images (safe - won't remove tagged images like backup)
            echo "🧹 Cleaning up dangling Docker images..."
            docker image prune -f || true

            echo "================================================"
            echo "✅ Deployment Complete"
            echo "================================================"
            echo "Backend: $(docker inspect -f '{{.State.Health.Status}}' bwaincell-backend 2>/dev/null || echo 'running')"
            echo "Database: Supabase (hosted)"
            echo "================================================"

      - name: Verify Supabase connection
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          key: ${{ secrets.PI_SSH_KEY }}
          passphrase: ${{ secrets.PI_SSH_PASSPHRASE }}
          port: ${{ secrets.PI_SSH_PORT || 22 }}
          timeout: 5m
          command_timeout: 2m
          script: |
            set -e

            echo "🔍 Verifying Supabase database connection..."
            cd ~/bwaincell

            # Source env to get DATABASE_URL
            source .env 2>/dev/null || true

            # Check that backend can reach Supabase by querying the health endpoint
            # The /health endpoint validates DB connectivity
            HEALTH=$(curl -sf http://localhost:3000/health || echo "failed")
            if echo "$HEALTH" | grep -q "healthy\|ok\|running"; then
              echo "✅ Backend connected to Supabase successfully"
            else
              echo "⚠️  Supabase connection not yet confirmed (backend may still be starting)"
            fi

      - name: Verify deployment health
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          key: ${{ secrets.PI_SSH_KEY }}
          passphrase: ${{ secrets.PI_SSH_PASSPHRASE }}
          port: ${{ secrets.PI_SSH_PORT || 22 }}
          timeout: 10m
          command_timeout: 10m
          script: |
            set -e

            echo "🔍 Post-Deployment Health Verification"
            echo "========================================"

            cd ~/bwaincell

            # Check Bot health with retries (Pi startup can take 60s+)
            echo "Checking Bot health endpoint..."
            MAX_RETRIES=12
            RETRY_DELAY=10

            for i in $(seq 1 $MAX_RETRIES); do
              HEALTH_RESPONSE=$(curl -sf http://localhost:3000/health || echo "failed")

              if echo "$HEALTH_RESPONSE" | grep -q "healthy\|ok\|running"; then
                echo "✅ Bot health check passed (attempt $i/$MAX_RETRIES)"
                echo "Response: $HEALTH_RESPONSE"
                break
              fi

              if [ $i -eq $MAX_RETRIES ]; then
                echo "❌ Bot health check failed after $MAX_RETRIES attempts"
                echo "Last response: $HEALTH_RESPONSE"

                echo "Container status:"
                docker ps -a | grep bwaincell

                echo "Recent backend logs:"
                docker logs --tail=100 bwaincell-backend 2>&1 || echo "Could not retrieve logs"

                exit 1
              fi

              echo "⏳ Health check attempt $i/$MAX_RETRIES failed, retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            done

            # Check Backend container is running
            echo "Checking Backend container status..."
            BACKEND_STATUS=$(docker inspect -f '{{.State.Status}}' bwaincell-backend 2>/dev/null || echo "unknown")
            if [ "$BACKEND_STATUS" != "running" ]; then
              echo "❌ Backend container is not running: $BACKEND_STATUS"
              docker logs --tail=100 bwaincell-backend
              exit 1
            fi
            echo "✅ Backend container is running"

            # Check Discord connection in logs
            echo "Verifying Discord connection..."
            sleep 5
            if docker logs --tail=100 bwaincell-backend 2>&1 | grep -q "Ready!\|logged in\|Bot is ready\|Connected to Discord"; then
              echo "✅ Bot connected to Discord"
            else
              echo "⚠️  Discord connection not confirmed in logs (may still be connecting)"
              docker logs --tail=50 bwaincell-backend
            fi

            echo "========================================"
            echo "✅ All health checks passed"
            echo "Deployment verified successfully"

  # ---------------------------------------------------------------------------
  # Automatic Rollback (on deployment failure)
  # ---------------------------------------------------------------------------
  rollback:
    name: Automatic Rollback
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
      - name: Rollback to previous image
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          key: ${{ secrets.PI_SSH_KEY }}
          passphrase: ${{ secrets.PI_SSH_PASSPHRASE }}
          port: ${{ secrets.PI_SSH_PORT || 22 }}
          timeout: 15m
          command_timeout: 10m
          script: |
            set -e

            echo "================================================"
            echo "🔄 Starting Automatic Rollback"
            echo "================================================"

            cd ~/bwaincell || {
              echo "❌ Directory ~/bwaincell not found"
              exit 1
            }

            # Check if backup image exists
            BACKUP_IMAGE=$(docker images bwaincell-backend:backup -q 2>/dev/null || echo "none")

            if [ "$BACKUP_IMAGE" = "none" ]; then
              echo "⚠️  No backup image available for rollback"
              echo "This may be the first deployment - manual intervention required"
              exit 1
            fi

            echo "✅ Backup image found: $BACKUP_IMAGE"

            # Stop current (failed) container
            echo "🛑 Stopping current container..."
            docker compose down || true

            # Restore backup image as latest
            echo "🔄 Restoring backup image..."
            docker tag bwaincell-backend:backup bwaincell-backend:latest

            # Restart service with backup image
            echo "🚀 Starting service with backup image..."
            docker compose up -d

            # Wait for service to start (bot needs time: DB connect + command load + Discord login + API start)
            echo "⏳ Waiting for services to start (60s for Pi cold boot)..."
            sleep 60

            # Verify bot health
            echo "🔍 Verifying bot health..."
            for i in {1..15}; do
              HEALTH=$(curl -sf http://localhost:3000/health || echo "failed")
              if echo "$HEALTH" | grep -q "healthy\|ok\|running"; then
                echo "✅ Bot health check passed"
                echo "$HEALTH"
                break
              fi
              echo "Attempt $i/15 - Bot not healthy yet, waiting..."
              sleep 3
            done

            # Check bot Discord connection
            echo "🔍 Checking Discord connection..."
            sleep 5
            if docker logs --tail=50 bwaincell-backend 2>&1 | grep -q "Ready!\|logged in\|Bot is ready\|Connected to Discord"; then
              echo "✅ Bot connected to Discord"
            else
              echo "⚠️  Discord connection not confirmed (bot may still be starting)"
            fi

            # Display final status
            echo "================================================"
            echo "✅ Rollback Complete"
            echo "================================================"
            echo "Backend: $(docker inspect -f '{{.State.Health.Status}}' bwaincell-backend 2>/dev/null || echo 'running')"
            echo "================================================"

      - name: Verify rollback success
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USERNAME }}
          key: ${{ secrets.PI_SSH_KEY }}
          passphrase: ${{ secrets.PI_SSH_PASSPHRASE }}
          port: ${{ secrets.PI_SSH_PORT || 22 }}
          timeout: 5m
          command_timeout: 2m
          script: |
            set -e

            echo "🔍 Verifying Rollback Success"
            echo "========================================"

            cd ~/bwaincell

            # Check container is running
            BACKEND_STATUS=$(docker inspect -f '{{.State.Status}}' bwaincell-backend 2>/dev/null || echo "unknown")

            if [ "$BACKEND_STATUS" != "running" ]; then
              echo "❌ Backend rollback failed: $BACKEND_STATUS"
              exit 1
            fi

            # Final health check
            HEALTH=$(curl -sf http://localhost:3000/health || echo "failed")
            if ! echo "$HEALTH" | grep -q "healthy\|ok\|running"; then
              echo "❌ Backend health check failed after rollback"
              exit 1
            fi

            echo "✅ Backend healthy after rollback"
            echo "========================================"
