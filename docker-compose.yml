# =============================================================================
# Bwaincell - Production Docker Compose (Monorepo)
# =============================================================================
# Architecture:
#   - Backend (Discord Bot + Express API) → Raspberry Pi (sunny-pi)
#   - Database: Self-hosted Supabase on the Pi (managed via `supabase start`,
#     not defined here; see supabase/config.toml)
#   - Frontend (Next.js PWA) → Vercel (separate deployment)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Backend Service - Discord.js 14 + Express API + Supabase (Monorepo)
  # ---------------------------------------------------------------------------
  backend:
    # Image is built on GitHub Actions and pushed to GHCR.
    # On the Pi, `docker compose up -d` only PULLS this image.
    # For local development builds, override with `docker compose -f docker-compose.yml -f docker-compose.dev.yml ...`
    # or build manually: `docker build -t ghcr.io/strawhatluka/bwaincell-backend:latest -f backend/Dockerfile .`
    image: ghcr.io/strawhatluka/bwaincell-backend:latest
    container_name: bwaincell-backend

    # Restart policy for high availability
    restart: unless-stopped

    # Environment variables from production file
    env_file:
      - .env

    # Additional environment overrides
    environment:
      - NODE_ENV=production
      - DEPLOYMENT_MODE=pi
      - TZ=America/Los_Angeles  # Set your timezone (important for reminders)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

    # Health check configuration (matches Dockerfile HEALTHCHECK)
    # start_period must be generous: bot loads DB, commands, scheduler, Discord login, THEN starts API
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    # Port mapping
    ports:
      - "3000:3000"  # Express API + health endpoint

    # Persistent storage for logs
    volumes:
      - ./data:/app/data  # Data persistence (if needed)
      - ./logs:/app/logs  # Log files persistence

    # Note: deploy.resources removed - requires cgroup support which Pi kernel lacks

    # Logging configuration with rotation
    logging:
      driver: "json-file"
      options:
        max-size: "25m"   # Max 25MB per log file
        max-file: "3"     # Keep 3 rotated files (75MB total)
        compress: "true"  # Compress rotated logs

    # Security options
    security_opt:
      - no-new-privileges:true  # Prevent privilege escalation

    # Run as non-root user (matches Dockerfile USER)
    user: "1001:1001"

    # Network configuration
    networks:
      - bwaincell-network

    # Labels for management
    labels:
      com.bwaincell.service: "discord-bot"
      com.bwaincell.environment: "production"
      com.bwaincell.platform: "raspberry-pi"

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  bwaincell-network:
    driver: bridge
    labels:
      com.bwaincell.description: "Production network for Pi services"

# =============================================================================
# Usage Instructions (Monorepo)
# =============================================================================
#
# Architecture:
#   - Backend (Discord Bot + Express API) → Raspberry Pi (sunny-pi)
#   - Database: Self-hosted Supabase on the Pi (started separately via the
#     Supabase CLI: `supabase start`; managed by supabase/config.toml)
#   - Frontend (Next.js PWA) → Vercel (separate deployment, not in Docker)
#   - Logs stored in ./logs volume
#
# Prerequisites:
#   1. Create .env with production credentials (see .env.example)
#   2. Ensure BOT_TOKEN, CLIENT_ID, GUILD_ID, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY are set
#      (SUPABASE_URL points at the local Supabase stack on this host)
#   3. Self-hosted Supabase stack must be running on the host (`supabase start`)
#   4. Authenticate with GHCR to pull the image:
#        echo $GHCR_PAT | docker login ghcr.io -u strawhatluka --password-stdin
#      (GHCR_PAT = GitHub PAT with read:packages scope)
#
# Backend Image (GHCR):
#   The backend image is built by GitHub Actions on every deploy and pushed to:
#     ghcr.io/strawhatluka/bwaincell-backend:latest
#   This compose file PULLS the image; it is NOT built locally on the Pi.
#
# Pull Latest Image:
#   docker compose pull backend
#
# Start Services:
#   docker compose up -d
#
# View Logs:
#   docker compose logs -f
#   docker compose logs -f backend
#
# Check Health:
#   docker compose ps
#   curl http://localhost:3000/health
#
# Stop Services:
#   docker compose down
#
# Update Backend (on the Pi):
#   docker compose pull backend
#   docker compose up -d
#
# Local Development Build (if you need to build manually outside CI):
#   docker build -t ghcr.io/strawhatluka/bwaincell-backend:latest -f backend/Dockerfile .
#   docker compose up -d
#
# View Resource Usage:
#   docker stats bwaincell-backend
#
# Database (Self-hosted Supabase on the Pi):
#   Supabase runs as its own Docker stack alongside this compose file.
#   Manage with the Supabase CLI from the project root:
#     supabase start           # Start the local Supabase stack
#     supabase status          # Show running services / ports
#     supabase migration up    # Apply pending migrations
#     supabase stop            # Stop the local Supabase stack
#   Config: supabase/config.toml (api on :54321, db on :5433, studio on :54323)
#
# Frontend Deployment (Vercel):
#   The frontend/ directory is deployed separately to Vercel
#   See frontend/README.md for Vercel deployment instructions
#   Frontend will connect to backend API at http://localhost:3000 (dev)
#   or your production backend URL (prod)
#
# =============================================================================
